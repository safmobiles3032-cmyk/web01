<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEXON Admin</title>
  <style>
    :root {
      --bg: #07080b;
      --panel: #101219;
      --panel-2: #151923;
      --line: rgba(255,255,255,.1);
      --line-strong: rgba(255,255,255,.2);
      --text: #f6f7fb;
      --muted: #9ca3af;
      --muted-2: #6b7280;
      --accent: #f7f7f8;
      --good: #27d17f;
      --warn: #f4c55f;
      --bad: #ff6b6b;
      --info: #67b7ff;
      --shadow: 0 24px 70px rgba(0,0,0,.42);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      background: linear-gradient(160deg, #07080b 0%, #0d1017 52%, #06070a 100%);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .56; }

    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(430px, 100%);
      background: rgba(16,18,25,.96);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .brand {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .brand span {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      margin-right: 9px;
      border-radius: 8px;
      background: #fff;
      color: #08090c;
    }

    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 28px; line-height: 1.1; }
    h2 { font-size: 20px; }
    h3 { font-size: 15px; }
    p { margin: 0; color: var(--muted); line-height: 1.55; }

    .app {
      display: none;
      min-height: 100vh;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px;
      border-right: 1px solid var(--line);
      background: rgba(8,9,13,.86);
    }

    .nav {
      display: grid;
      gap: 5px;
      margin-top: 22px;
    }

    .nav button {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      padding: 0 12px;
      font-weight: 650;
    }

    .nav button.active,
    .nav button:hover {
      color: var(--text);
      background: rgba(255,255,255,.07);
      border-color: var(--line);
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .page {
      display: none;
      animation: fade .14s ease-out;
    }

    .page.active { display: block; }

    @keyframes fade {
      from { opacity: .5; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      margin-bottom: 18px;
    }

    .metric,
    .panel {
      background: rgba(16,18,25,.96);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 44px rgba(0,0,0,.18);
    }

    .metric {
      min-height: 104px;
      padding: 16px;
      display: grid;
      align-content: space-between;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric .value {
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      margin-top: 13px;
    }

    .panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(340px, .8fr);
      gap: 16px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }
    label { color: var(--muted); font-size: 12px; font-weight: 700; }

    input, select, textarea {
      width: 100%;
      min-height: 40px;
      color: var(--text);
      background: rgba(0,0,0,.25);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      padding: 9px 11px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(255,255,255,.55);
      box-shadow: 0 0 0 2px rgba(255,255,255,.08);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255,255,255,.06);
      padding: 0 12px;
      font-weight: 750;
    }

    .btn:hover { border-color: var(--line-strong); background: rgba(255,255,255,.1); }
    .btn.primary { background: #fff; color: #090a0d; border-color: #fff; }
    .btn.danger { color: #ffd7d7; border-color: rgba(255,107,107,.42); background: rgba(255,107,107,.1); }
    .btn.slim { min-height: 31px; padding: 0 9px; font-size: 12px; }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #11141c;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    tr:hover td { background: rgba(255,255,255,.03); }
    tr:last-child td { border-bottom: 0; }

    .muted { color: var(--muted); }
    .tiny { color: var(--muted-2); font-size: 12px; }
    .mono { font-family: "Cascadia Mono", Consolas, monospace; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      border: 1px solid var(--line);
    }

    .badge.active { color: #bfffe0; border-color: rgba(39,209,127,.42); background: rgba(39,209,127,.12); }
    .badge.expired { color: #ffdede; border-color: rgba(255,107,107,.42); background: rgba(255,107,107,.1); }
    .badge.disabled { color: #d8d8e0; border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.07); }
    .badge.soon { color: #fff0c0; border-color: rgba(244,197,95,.44); background: rgba(244,197,95,.12); }
    .badge.trial { color: #d7eaff; border-color: rgba(103,183,255,.44); background: rgba(103,183,255,.12); }

    .status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--muted);
    }

    .status.error { color: var(--bad); }
    .status.ok { color: var(--good); }

    .hidden { display: none !important; }

    dialog {
      width: min(980px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 0;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    dialog::backdrop { background: rgba(0,0,0,.72); }
    .dialog-head {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(16,18,25,.98);
    }

    .dialog-body { padding: 16px; }

    .qr-preview {
      display: grid;
      place-items: center;
      min-height: 280px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: #111;
      text-align: center;
    }

    .qr-preview img {
      max-width: 260px;
      max-height: 260px;
      object-fit: contain;
    }

    .web-player-list {
      display: grid;
      gap: 14px;
    }

    .web-player-card {
      cursor: grab;
    }

    .web-player-card.dragging {
      opacity: .62;
      border-color: rgba(255,255,255,.38);
    }

    .thumb-preview {
      display: grid;
      place-items: center;
      min-height: 150px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0,0,0,.24);
      color: var(--muted);
    }

    .thumb-preview img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      min-width: 250px;
      max-width: min(440px, calc(100vw - 36px));
      background: #11141c;
      color: var(--text);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      display: none;
    }

    .toast.show { display: block; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .main { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .metrics, .form-grid { grid-template-columns: 1fr; }
      .nav { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section class="auth-shell" id="authShell">
    <div class="auth-card">
      <div class="brand"><span>N</span>NEXON ADMIN</div>
      <h1>Admin Sign In</h1>
      <p style="margin-top:8px">Use a Supabase Auth account that exists in `admin_users`.</p>
      <div class="field" style="margin-top:18px">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" autocomplete="email" type="email" placeholder="admin@example.com" />
      </div>
      <div class="field" style="margin-top:12px">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" autocomplete="current-password" type="password" placeholder="Password" />
      </div>
      <div class="actions">
        <button class="btn primary" id="loginBtn">Sign In</button>
      </div>
      <div class="status" id="authStatus"></div>
    </div>
  </section>

  <section class="app" id="appShell">
    <aside class="sidebar">
      <div class="brand"><span>N</span>NEXON ADMIN</div>
      <p id="adminEmail" class="tiny"></p>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Manual subscriptions and global app settings.</p>
        </div>
        <div class="topbar-actions">
          <button class="btn slim" id="refreshBtn">Refresh</button>
          <button class="btn slim" id="logoutBtn">Sign Out</button>
        </div>
      </div>

      <section class="page active" id="page-dashboard"></section>
      <section class="page" id="page-customers"></section>
      <section class="page" id="page-subscriptions"></section>
      <section class="page" id="page-payments"></section>
      <section class="page" id="page-appupdates"></section>
      <section class="page" id="page-iptv"></section>
      <section class="page" id="page-webplayers"></section>
      <section class="page" id="page-qr"></section>
      <section class="page" id="page-settings"></section>
    </main>
  </section>

  <dialog id="customerDialog">
    <div class="dialog-head">
      <div>
        <h2 id="customerDialogTitle">Customer</h2>
        <p id="customerDialogSubtitle"></p>
      </div>
      <button class="btn slim" onclick="closeCustomerDialog()">Close</button>
    </div>
    <div class="dialog-body" id="customerDialogBody"></div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from "@supabase/supabase-js";

    const envValue = (value) => {
      const trimmed = String(value || "").trim();
      if (/^%VITE_[A-Z0-9_]+%$/.test(trimmed)) return "";
      return trimmed.replace(/^["']|["']$/g, "");
    };
    const SUPABASE_URL = envValue("%VITE_SUPABASE_URL%").replace(/\/+$/, "");
    const SUPABASE_ANON_KEY = envValue("%VITE_SUPABASE_ANON_KEY%") || envValue("%VITE_SUPABASE_PUBLISHABLE_KEY%");
    const API_URL = envValue("%VITE_SUPABASE_ADMIN_API_URL%") || `${SUPABASE_URL}/functions/v1/admin-api`;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      const status = document.getElementById("authStatus");
      if (status) {
        status.textContent = "Missing Supabase env vars. Copy .env.example to .env.local and set VITE_SUPABASE_URL plus VITE_SUPABASE_ANON_KEY.";
        status.className = "status error";
      }
      throw new Error("Missing Supabase environment variables");
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const pages = [
      ["dashboard", "Dashboard", "Subscription health and recent activity."],
      ["customers", "Customers", "Search and manage registered users."],
      ["subscriptions", "Subscriptions", "Plan settings and current subscription states."],
      ["payments", "Payments", "Manual payment verification history."],
      ["appupdates", "App Updates", "In-app APK update prompts and required version gates."],
      ["iptv", "IPTV Sources", "Shared M3U sources for all, sports, and kids profiles."],
      ["webplayers", "Web Players", "Dynamic Web Apps cards managed without APK updates."],
      ["qr", "Payment QR Settings", "QR image, UPI details, and Android payment text."],
      ["settings", "Settings", "Admin session and deployment details."],
    ];

    const state = {
      admin: null,
      page: "dashboard",
      data: null,
      selectedCustomer: null,
      customerSearch: "",
      sourceFilter: "",
      paymentFilter: "",
      qrUploadDataUrl: "",
      webPlayerUploads: {},
      webPlayerDragId: "",
    };

    const $ = (id) => document.getElementById(id);
    const money = (v) => `Rs ${Number(v || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 })}`;
    const dateTime = (v) => v ? new Date(v).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" }) : "Not set";
    const dateOnly = (v) => v ? new Date(v).toLocaleDateString("en-IN", { dateStyle: "medium" }) : "Not set";
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

    function toast(message, type = "") {
      const el = $("toast");
      el.textContent = message;
      el.className = `toast show ${type}`.trim();
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
    }

    function setAuthStatus(message, type = "") {
      $("authStatus").textContent = message || "";
      $("authStatus").className = `status ${type}`.trim();
    }

    function networkErrorMessage(error, target) {
      const message = error?.message || String(error);
      if (/failed to fetch|networkerror|load failed/i.test(message)) {
        return `Could not reach ${target}. Check the Vercel Supabase env vars, redeploy the site, and make sure the Supabase admin-api Edge Function is deployed.`;
      }
      return message;
    }

    async function adminApi(action, payload = {}) {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.access_token) throw new Error("Please sign in again.");
      let resp;
      try {
        resp = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${session.access_token}`,
          },
          body: JSON.stringify({ action, ...payload }),
        });
      } catch (error) {
        throw new Error(networkErrorMessage(error, "the Supabase admin API"));
      }
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || `Request failed (${resp.status})`);
      return json;
    }

    function subscriptionBadge(row) {
      const status = row?.subscription_state || row?.status || "expired";
      const days = row?.days_remaining;
      if (status === "active" && typeof days === "number" && days <= 7) {
        return `<span class="badge soon">Expiring Soon</span>`;
      }
      return `<span class="badge ${esc(status)}">${esc(status)}</span>`;
    }

    function daysText(days) {
      if (days == null || Number.isNaN(Number(days))) return "Not set";
      if (days < 0) return "Expired";
      if (days === 0) return "Today";
      return `${days} day${days === 1 ? "" : "s"}`;
    }

    function calcCustomerDays(customer) {
      const expiresAt = customer?.subscription?.expires_at;
      if (!expiresAt) return null;
      return Math.ceil((new Date(expiresAt).getTime() - Date.now()) / 86400000);
    }

    function showPage(page) {
      state.page = page;
      for (const [id, label, subtitle] of pages) {
        $(`page-${id}`).classList.toggle("active", id === page);
        const btn = document.querySelector(`[data-page="${id}"]`);
        if (btn) btn.classList.toggle("active", id === page);
        if (id === page) {
          $("pageTitle").textContent = label;
          $("pageSubtitle").textContent = subtitle;
        }
      }
      render();
    }

    function renderNav() {
      $("nav").innerHTML = pages.map(([id, label]) =>
        `<button data-page="${id}" class="${id === state.page ? "active" : ""}">${label}</button>`
      ).join("");
      document.querySelectorAll("[data-page]").forEach((btn) => {
        btn.addEventListener("click", () => showPage(btn.dataset.page));
      });
    }

    async function loadAll() {
      $("refreshBtn").disabled = true;
      try {
        const result = await adminApi("bootstrap");
        state.admin = result.admin;
        state.data = result.data;
        $("adminEmail").textContent = `${state.admin.email || state.admin.id} - ${state.admin.role}`;
        $("authShell").style.display = "none";
        $("appShell").style.display = "grid";
        renderNav();
        render();
      } catch (error) {
        $("appShell").style.display = "none";
        $("authShell").style.display = "grid";
        setAuthStatus(networkErrorMessage(error, "the Supabase admin API"), "error");
      } finally {
        $("refreshBtn").disabled = false;
      }
    }

    function render() {
      if (!state.data) return;
      renderDashboard();
      renderCustomers();
      renderSubscriptions();
      renderPayments();
      renderAppUpdates();
      renderIptv();
      renderWebPlayers();
      renderQr();
      renderSettings();
    }

    function renderDashboard() {
      const data = state.data.dashboard || {};
      const s = data.stats || {};
      $("page-dashboard").innerHTML = `
        <div class="grid metrics">
          ${metric("Total customers", s.total_customers)}
          ${metric("Active subscriptions", s.active_subscriptions)}
          ${metric("Expired subscriptions", s.expired_subscriptions)}
          ${metric("Expiring in 3 days", s.expiring_in_3_days)}
          ${metric("Expiring in 7 days", s.expiring_in_7_days)}
          ${metric("Manual payments this month", s.payments_this_month)}
          ${metric("Estimated monthly revenue", money(s.estimated_monthly_revenue))}
        </div>
        <div class="split">
          <div class="panel">
            <div class="panel-head"><h2>Recent Customers</h2><button class="btn slim" onclick="showPage('customers')">View All</button></div>
            ${customersTable(data.recent_customers || [], true)}
          </div>
          <div class="panel">
            <div class="panel-head"><h2>Recent Payment Updates</h2><button class="btn slim" onclick="showPage('payments')">View All</button></div>
            ${paymentsTable(data.recent_payments || [], true)}
          </div>
        </div>
      `;
    }

    function metric(label, value) {
      return `<div class="metric"><div class="label">${esc(label)}</div><div class="value">${esc(value ?? 0)}</div></div>`;
    }

    function customersTable(rows, compact = false) {
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Email</th><th>User ID</th><th>Status</th><th>Expiry</th><th>Days</th><th></th>
            </tr></thead>
            <tbody>
              ${rows.length ? rows.map((c) => `
                <tr>
                  <td>${esc(c.email || c.username || "No email")}</td>
                  <td class="mono tiny">${esc(c.id)}</td>
                  <td>${subscriptionBadge(c)}</td>
                  <td>${dateOnly(c.subscription?.expires_at)}</td>
                  <td>${daysText(c.days_remaining ?? calcCustomerDays(c))}</td>
                  <td><button class="btn slim" onclick="openCustomer('${esc(c.id)}')">${compact ? "Open" : "Details"}</button></td>
                </tr>
              `).join("") : `<tr><td colspan="6" class="muted">No customers found.</td></tr>`}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderCustomers() {
      const rows = (state.data.customers || []).filter((c) => {
        const q = state.customerSearch.trim().toLowerCase();
        if (!q) return true;
        return [c.email, c.username, c.id].some((v) => String(v || "").toLowerCase().includes(q));
      });
      $("page-customers").innerHTML = `
        <div class="panel">
          <div class="panel-head">
            <h2>Customers</h2>
            <input style="max-width:360px" id="customerSearch" value="${esc(state.customerSearch)}" placeholder="Search email, name, or user_id" />
          </div>
          ${customersTable(rows)}
        </div>
      `;

      });

    function subscriptionStateFromSub(sub) {
      if (!sub || !sub.id) return "expired";
      if (sub.disabled_by_admin || sub.status === "disabled") return "disabled";
      if (sub.is_active && sub.status === "active" && new Date(sub.expires_at).getTime() > Date.now()) return "active";
      if (sub.status === "trial") return "trial";
      return "expired";
    }

    function daysUntilSub(sub) {
      if (!sub?.expires_at) return null;
      return Math.ceil((new Date(sub.expires_at).getTime() - Date.now()) / 86400000);
    }

    window.syncPaymentAmount = () => {
      const months = Math.max(Number($("payMonths").value || 1), 1);
      $("payAmount").value = String(Number(state.data.plan?.price || 179) * months);
    };

    window.verifyCurrentPayment = async () => {
      const userId = state.selectedCustomer?.profile?.id;
      if (!userId) return;
      try {
        await adminApi("verify_payment", {
          user_id: userId,
          months_added: Number($("payMonths").value || 1),
          amount: Number($("payAmount").value || 0),
          payment_method: $("payMethod").value,
          payment_reference: $("payReference").value,
          admin_notes: $("payNotes").value,
        });
        toast("Payment verified and subscription extended.", "ok");
        await loadAll();
        await window.openCustomer(userId);
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.adjustCurrentCustomer = async (action) => {
      const userId = state.selectedCustomer?.profile?.id;
      if (!userId) return;
      if (action === "turn_off" && !confirm("Turn OFF this customer subscription?")) return;
      const expiresInput = $("customExpiry")?.value;
      const expiresAt = expiresInput ? new Date(expiresInput).toISOString() : null;
      try {
        await adminApi("adjust_subscription", {
          user_id: userId,
          subscription_action: action,
          months: 1,
          days: Number($("reduceDays")?.value || 0),
          expires_at: action === "set_expiry" ? expiresAt : null,
          admin_notes: $("subNotes")?.value || null,
        });
        toast("Subscription updated.", "ok");
        await loadAll();
        await window.openCustomer(userId);
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.savePlan = async () => {
      try {
        await adminApi("save_plan", {
          plan: {
            id: state.data.plan?.id,
            name: $("planName").value,
            price: Number($("planPrice").value || 179),

          },
        });
        toast("Plan saved.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.saveQr = async () => {
      try {
        const current = state.data.qr_settings || {};
        await adminApi("save_qr_settings", {
          qr_image_data_url: state.qrUploadDataUrl || "",
          settings: {
            qr_image_url: current.qr_image_url || "",
            upi_id: $("qrUpi").value,
            receiver_name: $("qrReceiver").value,
            support_contact: $("qrSupport").value,
            instruction_text: $("qrInstruction").value,
            is_enabled: $("qrEnabled").value === "true",
          },
        });
        state.qrUploadDataUrl = "";
        toast("QR settings saved.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.clearAppUpdateForm = () => {
      ["updateId", "updateVersionName", "updateVersionCode", "updateApkUrl", "updateReleaseNotes"].forEach((id) => $(id).value = "");
      $("updateRequired").value = "false";
      $("updateActive").value = "true";
    };

    window.editAppUpdate = (id) => {
      const row = (state.data.app_updates || []).find((item) => item.id === id);
      if (!row) return;
      $("updateId").value = row.id || "";
      $("updateVersionName").value = row.version_name || "";
      $("updateVersionCode").value = row.version_code || "";
      $("updateApkUrl").value = row.apk_url || "";
      $("updateReleaseNotes").value = row.release_notes || "";
      $("updateRequired").value = String(row.is_required === true);
      $("updateActive").value = String(row.is_active === true);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.saveAppUpdate = async () => {
      try {
        await adminApi("save_app_update", {
          update: {
            id: $("updateId").value,
            version_name: $("updateVersionName").value,
            version_code: Number($("updateVersionCode").value || 0),
            apk_url: $("updateApkUrl").value,
            release_notes: $("updateReleaseNotes").value,
            is_required: $("updateRequired").value === "true",
            is_active: $("updateActive").value === "true",
          },
        });
        toast("App update saved.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.deleteAppUpdate = async (id) => {
      if (!id || !confirm("Delete this app update?")) return;
      try {
        await adminApi("delete_app_update", { id });
        toast("App update deleted.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.clearSourceForm = () => {
      ["sourceId", "sourceName", "sourceM3u", "sourceEpg"].forEach((id) => $(id).value = "");
      $("sourceProfile").value = "all";
      $("sourceSort").value = "0";
      $("sourceEnabled").value = "true";
    };

    window.editSourceById = (id) => {
      const source = (state.data.sources || []).find((item) => item.id === id);
      if (!source) return;
      $("sourceId").value = source.id || "";
      $("sourceProfile").value = source.profile_id || "all";
      $("sourceName").value = source.name || "";
      $("sourceM3u").value = source.m3u_url || "";
      $("sourceEpg").value = source.epg_url || "";
      $("sourceSort").value = source.sort_order ?? 0;
      $("sourceEnabled").value = String(source.is_enabled !== false);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.saveSource = async () => {
      try {
        await adminApi("save_source", {
          source: {
            id: $("sourceId").value,
            profile_id: $("sourceProfile").value,
            name: $("sourceName").value,
            m3u_url: $("sourceM3u").value,
            epg_url: $("sourceEpg").value,
            sort_order: Number($("sourceSort").value || 0),
            is_enabled: $("sourceEnabled").value === "true",
          },
        });
        toast("Source saved.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.deleteSource = async (id) => {
      if (!confirm("Delete this IPTV source?")) return;
      try {
        await adminApi("delete_source", { id });
        toast("Source deleted.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.testSourceUrl = async () => {
      try {
        const result = await adminApi("test_source", { url: $("sourceM3u").value });
        const data = result.data;
        toast(data.message || (data.ok ? "Source responded." : "Source failed."));
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    async function handleWebPlayerFile(key, event, previewId) {
      const file = event.target.files?.[0];
      if (!file) return;
      state.webPlayerUploads[key] = await fileToDataUrl(file);
      $(previewId).innerHTML = `<img src="${state.webPlayerUploads[key]}" alt="Thumbnail preview" />`;
    }

    window.saveWebPlayer = async (target) => {
      try {
        const players = [...(state.data.web_players || [])]
          .sort((a, b) =>
            Number(a.sort_order || 0) - Number(b.sort_order || 0) ||
            String(a.created_at || "").localeCompare(String(b.created_at || "")) ||
            String(a.title || "").localeCompare(String(b.title || ""))
          );
        const isNew = target === "new";
        const index = Number(target);
        const existing = isNew ? null : players[index];
        const key = isNew ? "new" : existing?.id;
        if (!isNew && !existing?.id) throw new Error("Missing Web Player id");
        await adminApi("save_web_player", {
          thumbnail_data_url: state.webPlayerUploads[key] || "",
          player: {
            id: existing?.id || "",
            title: $(isNew ? "wpNewTitle" : `wpTitle${index}`).value,
            description: $(isNew ? "wpNewDescription" : `wpDescription${index}`).value,
            thumbnail_url: $(isNew ? "wpNewThumbUrl" : `wpThumbUrl${index}`).value,
            url: $(isNew ? "wpNewUrl" : `wpUrl${index}`).value,
            category: $(isNew ? "wpNewCategory" : `wpCategory${index}`).value,
            sort_order: Number($(isNew ? "wpNewSort" : `wpSort${index}`).value || (index + 1)),
            enabled: $(isNew ? "wpNewEnabled" : `wpEnabled${index}`).value === "true",
            open_mode: $(isNew ? "wpNewOpenMode" : `wpOpenMode${index}`).value,
          },
        });
        if (key) delete state.webPlayerUploads[key];
        toast(isNew ? "Web Player added." : "Web Player saved.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.deleteWebPlayer = async (id) => {
      if (!id || !confirm("Delete this Web Player?")) return;
      try {
        await adminApi("delete_web_player", { id });
        delete state.webPlayerUploads[id];
        toast("Web Player deleted.", "ok");
        await loadAll();
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    async function saveWebPlayerOrder(ids) {
      await adminApi("reorder_web_players", { ids });
      toast("Web Player order saved.", "ok");
      await loadAll();
    }

    window.moveWebPlayer = async (id, delta) => {
      const ids = [...(state.data.web_players || [])]
        .sort((a, b) =>
          Number(a.sort_order || 0) - Number(b.sort_order || 0) ||
          String(a.created_at || "").localeCompare(String(b.created_at || "")) ||
          String(a.title || "").localeCompare(String(b.title || ""))
        )
        .map((p) => String(p.id || ""))
        .filter(Boolean);
      const index = ids.indexOf(id);
      const next = index + delta;
      if (index < 0 || next < 0 || next >= ids.length) return;
      [ids[index], ids[next]] = [ids[next], ids[index]];
      try {
        await saveWebPlayerOrder(ids);
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.webPlayerDragStart = (event, id) => {
      state.webPlayerDragId = id;
      event.currentTarget.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", id);
    };

    window.webPlayerDragOver = (event) => {
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
    };

    window.webPlayerDrop = async (event, targetId) => {
      event.preventDefault();
      const sourceId = state.webPlayerDragId || event.dataTransfer.getData("text/plain");
      if (!sourceId || !targetId || sourceId === targetId) return;
      const ids = [...(state.data.web_players || [])]
        .sort((a, b) =>
          Number(a.sort_order || 0) - Number(b.sort_order || 0) ||
          String(a.created_at || "").localeCompare(String(b.created_at || "")) ||
          String(a.title || "").localeCompare(String(b.title || ""))
        )
        .map((p) => String(p.id || ""))
        .filter(Boolean);
      const from = ids.indexOf(sourceId);
      const to = ids.indexOf(targetId);
      if (from < 0 || to < 0) return;
      const [moved] = ids.splice(from, 1);
      ids.splice(to, 0, moved);
      try {
        await saveWebPlayerOrder(ids);
      } catch (error) {
        toast(error.message || String(error), "error");
      }
    };

    window.webPlayerDragEnd = (event) => {
      state.webPlayerDragId = "";
      event.currentTarget.classList.remove("dragging");
    };

    async function login() {
      try {
        setAuthStatus("Signing in...");
        $("loginBtn").disabled = true;
        const { error } = await supabase.auth.signInWithPassword({
          email: $("loginEmail").value.trim(),
          password: $("loginPassword").value,
        });
        if (error) throw error;
        setAuthStatus("Checking admin access...");
        await loadAll();
      } catch (error) {
        setAuthStatus(networkErrorMessage(error, "Supabase Auth"), "error");
      } finally {
        $("loginBtn").disabled = false;
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      state.admin = null;
      state.data = null;
      $("appShell").style.display = "none";
      $("authShell").style.display = "grid";
      setAuthStatus("");
    }

    $("loginBtn").addEventListener("click", login);
    $("loginPassword").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    $("refreshBtn").addEventListener("click", loadAll);
    $("logoutBtn").addEventListener("click", logout);
    window.logout = logout;

    async function init() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          await loadAll();
        } else {
          renderNav();
        }
      } catch (error) {
        setAuthStatus(networkErrorMessage(error, "Supabase"), "error");
        renderNav();
      }
    }

    init();
  </script>
</body>
</html>
